<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EdgeLedger // Core Authentication Gateway</title>
  <style>
    /* Futuristic Cyberpunk Design System */
    :root {
      --bg-dark: #03050d;
      --bg-matrix: #060919;
      --panel-glow: rgba(0, 242, 254, 0.15);
      --neon-cyan: #00f2fe;
      --neon-blue: #4facfe;
      --neon-purple: #7000ff;
      --text-crypto: #f1f5f9;
      --text-dim: #64748b;
      --system-red: #ff4a4a;
      --system-green: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-crypto);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(0, 242, 254, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(112, 0, 255, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, var(--bg-matrix) 0%, var(--bg-dark) 100%);
    }

    /* Cinematic Gateway Container */
    .gateway-frame {
      background: rgba(10, 15, 30, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 242, 254, 0.25);
      border-radius: 20px;
      padding: 45px 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 
        0 0 50px rgba(0, 0, 0, 0.6),
        0 0 30px var(--panel-glow);
      position: relative;
      overflow: hidden;
    }

    .gateway-frame::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-blue), transparent);
    }

    /* Tech Brand Identity / Logo */
    .brand-identity {
      text-align: center;
      margin-bottom: 30px;
    }

    .brand-logo {
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: 4px;
      background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-blue) 50%, var(--neon-purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 25px rgba(0, 242, 254, 0.4);
      display: inline-block;
    }

    .brand-tag {
      font-size: 0.75rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 6px;
    }

    /* SCRYPT Hardware Protection Status Shield */
    .scrypt-shield-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: rgba(16, 185, 129, 0.06);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 25px;
      font-size: 0.75rem;
      letter-spacing: 0.5px;
      color: #a7f3d0;
      font-weight: 600;
    }

    .shield-icon {
      color: var(--system-green);
      animation: pulseGlow 2s infinite alternate;
    }

    @keyframes pulseGlow {
      0% { opacity: 0.5; filter: drop-shadow(0 0 2px var(--system-green)); }
      100% { opacity: 1; filter: drop-shadow(0 0 8px var(--system-green)); }
    }

    /* Cyber Security Matrix Form Fields */
    .vector-group {
      margin-bottom: 24px;
      position: relative;
    }

    .vector-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--neon-cyan);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .cipher-input {
      width: 100%;
      padding: 15px 18px;
      background: rgba(4, 6, 14, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      color: #ffffff;
      font-size: 1rem;
      letter-spacing: 0.5px;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .cipher-input:focus {
      outline: none;
      border-color: var(--neon-cyan);
      background: rgba(6, 11, 26, 0.95);
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.15);
    }

    /* Professional Embedded Input Error Alerts */
    .input-error-alert {
      font-size: 0.75rem;
      color: var(--system-red);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 6px;
      display: none;
      font-weight: 600;
      animation: alertSlideIn 0.2s ease forwards;
    }

    @keyframes alertSlideIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Smart Real-Time Password Strength Engine */
    .strength-meter {
      height: 4px;
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      margin-top: 8px;
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }

    .strength-bar {
      height: 100%;
      width: 0%;
      transition: all 0.4s ease;
      background: var(--system-red);
    }

    .strength-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 5px;
      display: block;
      text-align: right;
    }

    /* High-Performance Interactive Controls */
    .matrix-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 35px;
    }

    .terminal-btn {
      padding: 16px;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s ease;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      position: relative;
    }

    .btn-auth-primary {
      background: linear-gradient(135deg, var(--neon-blue) 0%, var(--neon-cyan) 100%);
      color: #02040a;
      box-shadow: 0 4px 20px rgba(0, 242, 254, 0.2);
    }

    .btn-auth-primary:hover {
      box-shadow: 0 0 25px var(--neon-cyan);
      transform: translateY(-2px);
    }

    .btn-auth-secondary {
      background: transparent;
      color: var(--text-crypto);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .btn-auth-secondary:hover {
      border-color: var(--neon-cyan);
      background: rgba(0, 242, 254, 0.05);
      color: var(--neon-cyan);
      transform: translateY(-2px);
    }

    /* Status Notifications System */
    .terminal-log {
      margin-top: 20px;
      padding: 12px;
      background: rgba(239, 68, 68, 0.1);
      border-left: 3px solid var(--system-red);
      border-radius: 4px;
      font-size: 0.85rem;
      color: #fca5a5;
      display: none;
    }

    @media (max-width: 480px) {
      .gateway-frame { padding: 35px 25px; border-radius: 16px; }
      .brand-logo { font-size: 1.5rem; }
      .matrix-actions { grid-template-columns: 1fr; gap: 12px; }
    }
  </style>
</head>
<body>

  <div class="gateway-frame">
    <div class="brand-identity">
      <div class="brand-logo">EDGELEDGER</div>
      <div class="brand-tag">Secure Operations Gateway</div>
    </div>

    <div class="scrypt-shield-badge">
      <span class="shield-icon">🛡</span>
      <span>SCRYPT CRYPTO ENGINE: ACTIVE [MEM_COST: 14]</span>
    </div>

    <div class="vector-group">
      <div class="vector-label"><span>Identity Vector</span><span>[EMAIL]</span></div>
      <input type="email" id="identity_vector" class="cipher-input" placeholder="identity@network.internal" autocomplete="off" required>
      <div id="email_error" class="input-error-alert">⚠ INVALID EMAIL IDENTITY MATRIX STRUCTURE</div>
    </div>

    <div class="vector-group">
      <div class="vector-label"><span>Security Cipher</span><span>[8 - 15 CHARACTERS]</span></div>
      <input type="password" id="security_cipher" class="cipher-input" placeholder="••••••••••••" maxlength="15" autocomplete="off" required>
      <div id="password_error" class="input-error-alert">⚠ WEAK CIPHER REQUIREMENT STRUCTURE</div>
      
      <div id="strength_meter" class="strength-meter">
        <div id="strength_bar" class="strength-bar"></div>
      </div>
      <span id="strength_text" class="strength-label"></span>
    </div>

    <div id="console_log" class="terminal-log"></div>

    <div class="matrix-actions">
      <button class="terminal-btn btn-auth-secondary" onclick="triggerRegistration()">Sign Up</button>
      <button class="terminal-btn btn-auth-primary" onclick="triggerAuthorization()">Login</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

    // Firebase App Configuration Network Properties
    const firebaseConfig = {
      apiKey: "AIzaSyA9Hd0yqmN-utgABq3dQBf1XrJqeYoYGTM",
      authDomain: "edgeledger-df02e.firebaseapp.com",
      projectId: "edgeledger-df02e",
      storageBucket: "edgeledger-df02e.firebasestorage.app",
      messagingSenderId: "288280299492",
      appId: "1:288280299492:web:2e60ee0d51072a6fc8a9f1",
      measurementId: "G-YPCPYQ8N7W"
    };

    // Instantiate Connections
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const logBox = document.getElementById("console_log");
    const passInput = document.getElementById("security_cipher");
    const emailInput = document.getElementById("identity_vector");
    
    const emailError = document.getElementById("email_error");
    const passwordError = document.getElementById("password_error");

    const strengthMeter = document.getElementById("strength_meter");
    const strengthBar = document.getElementById("strength_bar");
    const strengthText = document.getElementById("strength_text");

    // Real-Platform Cipher Verification Calculus
    function analyzePassword(value) {
      let requirementsMet = 0;
      
      const hasUpper = /[A-Z]/.test(value);
      const hasNumber = /[0-9]/.test(value);
      const hasSpecial = /[^A-Za-z0-9]/.test(value);
      const structuralLength = value.length >= 8 && value.length <= 15;

      if (hasUpper) requirementsMet++;
      if (hasNumber) requirementsMet++;
      if (hasSpecial) requirementsMet++;
      if (structuralLength) requirementsMet++;

      return {
        score: requirementsMet,
        hasUpper,
        hasNumber,
        hasSpecial,
        structuralLength
      };
    }

    // Dynamic Strength Meter Event Hook
    passInput.addEventListener("input", () => {
      const value = passInput.value;
      passwordError.style.display = "none";
      
      if (value.length === 0) {
        strengthMeter.style.display = "none";
        strengthText.innerText = "";
        return;
      }

      strengthMeter.style.display = "block";
      const metrics = analyzePassword(value);

      if (metrics.score < 4) {
        strengthBar.style.width = "40%";
        strengthBar.style.backgroundColor = "var(--system-red)";
        strengthText.innerText = "CRITICAL: NEED CAPITAL, NUMBER, & SYMBOL (8-15 CHARS)";
        strengthText.style.color = "var(--system-red)";
      } else {
        strengthBar.style.width = "100%";
        strengthBar.style.backgroundColor = "var(--system-green)";
        strengthText.innerText = "OPTIMAL METRIC: SECURE CIPHER";
        strengthText.style.color = "var(--system-green)";
      }
    });

    emailInput.addEventListener("input", () => {
      emailError.style.display = "none";
    });

    // Structural Email RegEx Formula Verification
    function isInvalidEmail(email) {
      const matchPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return !matchPattern.test(email);
    }

    // Sign Up Logic Interface Block
    window.triggerRegistration = function() {
      const email = emailInput.value.trim();
      const password = passInput.value;
      
      logBox.style.display = "none";
      emailError.style.display = "none";
      passwordError.style.display = "none";

      if (!email) {
        emailError.innerText = "⚠ Email field cannot be empty";
        emailError.style.display = "block";
        return;
      }
      if (isInvalidEmail(email)) {
        emailError.innerText = "⚠ Invalid format. Example: user@domain.com";
        emailError.style.display = "block";
        return;
      }

      const metrics = analyzePassword(password);
      if (!metrics.structuralLength || !metrics.hasUpper || !metrics.hasNumber || !metrics.hasSpecial) {
        passwordError.innerText = "⚠ Rules unmet: Requires Capital, Number, Symbol & 8-15 Characters";
        passwordError.style.display = "block";
        return;
      }

      createUserWithEmailAndPassword(auth, email, password)
        .then(() => {
          window.location.href = "dashboard.html";
        })
        .catch(error => {
          logBox.innerText = `[SERVER REGISTER FAULT]: ${error.message.replace("Firebase: ", "").toUpperCase()}`;
          logBox.style.display = "block";
        });
    }

    // Login Logic Interface Block
    window.triggerAuthorization = function() {
      const email = emailInput.value.trim();
      const password = passInput.value;
      
      logBox.style.display = "none";
      emailError.style.display = "none";
      passwordError.style.display = "none";

      if (!email) {
        emailError.innerText = "⚠ Email field required";
        emailError.style.display = "block";
        return;
      }
      if (isInvalidEmail(email)) {
        emailError.innerText = "⚠ Invalid format structure";
        emailError.style.display = "block";
        return;
      }
      if (!password) {
        passwordError.innerText = "⚠ Password field required";
        passwordError.style.display = "block";
        return;
      }

      signInWithEmailAndPassword(auth, email, password)
        .then(() => {
          window.location.href = "dashboard.html";
        })
        .catch(error => {
          logBox.innerText = `[SERVER AUTH FAULT]: ${error.message.replace("Firebase: ", "").toUpperCase()}`;
          logBox.style.display = "block";
        });
    }
  </script>
</body>
</html>
